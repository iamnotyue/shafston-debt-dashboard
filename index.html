<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0B1120;color:#E2E8F0;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;min-height:100vh}
.app{max-width:1400px;margin:0 auto;padding:20px}
.header{text-align:center;padding:24px 0 16px}
.header h1{font-size:24px;font-weight:700;color:#F8FAFC;letter-spacing:-0.5px}
.header .subtitle{font-size:13px;color:#64748B;margin-top:4px}
.tabs{display:flex;gap:4px;justify-content:center;margin:16px 0 20px;flex-wrap:wrap}
.tab{padding:8px 20px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;background:#1E293B;color:#94A3B8;border:1px solid transparent;transition:all .2s}
.tab:hover{background:#334155;color:#CBD5E1}
.tab.active{background:#3B82F6;color:#FFF;border-color:#3B82F6}
.grid{display:grid;gap:16px}
.grid-4{grid-template-columns:repeat(4,1fr)}
.grid-3{grid-template-columns:repeat(3,1fr)}
.grid-2{grid-template-columns:repeat(2,1fr)}
.card{background:#1E293B;border-radius:12px;padding:20px;border:1px solid #334155}
.card-title{font-size:12px;color:#64748B;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px}
.card-value{font-size:28px;font-weight:700;color:#F8FAFC}
.card-value.green{color:#34D399}.card-value.red{color:#F87171}.card-value.blue{color:#60A5FA}.card-value.amber{color:#FBBF24}
.card-sub{font-size:12px;color:#64748B;margin-top:4px}
.section-title{font-size:16px;font-weight:600;color:#F1F5F9;margin:24px 0 12px;display:flex;align-items:center;gap:8px}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.badge-blue{background:rgba(59,130,246,.15);color:#60A5FA}
.badge-red{background:rgba(248,113,113,.15);color:#F87171}
.badge-green{background:rgba(52,211,153,.15);color:#34D399}
.badge-amber{background:rgba(251,191,36,.15);color:#FBBF24}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 12px;color:#94A3B8;font-weight:500;border-bottom:1px solid #334155;font-size:12px;text-transform:uppercase;letter-spacing:.3px}
td{padding:10px 12px;border-bottom:1px solid rgba(51,65,85,.5);color:#CBD5E1}
tr:hover td{background:rgba(51,65,85,.3)}
.text-right{text-align:right}.text-center{text-align:center}
.pct-bar{height:6px;border-radius:3px;background:#334155;overflow:hidden;min-width:60px}
.pct-fill{height:100%;border-radius:3px;transition:width .3s}
.legend-row{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin:8px 0}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:#94A3B8}
.legend-dot{width:10px;height:10px;border-radius:2px}
.note{font-size:12px;color:#64748B;padding:12px 16px;background:rgba(30,41,59,.5);border-radius:8px;border-left:3px solid #3B82F6;margin-top:12px}
@media(max-width:900px){.grid-4,.grid-3{grid-template-columns:repeat(2,1fr)}.grid-2{grid-template-columns:1fr}}
@media(max-width:600px){.grid-4,.grid-3,.grid-2{grid-template-columns:1fr}.app{padding:12px}}
</style>
</head>

    ),
    e("div",{className:"note"},"Concentration: Top 3 = "+((TS.slice(0,3).reduce(function(s,x){return s+x.net},0)/TN*100).toFixed(1))+"%. Shafston Sydney ($494K) is intercompany.")
  );
}

function App(){
  var ref=React.useState(0);var tab=ref[0];var setTab=ref[1];
  var tabs=["Overview","Monthly Trend","Rent Analysis","Top Suppliers"];
  var panels=[OverviewTab,MonthlyTab,RentTab,SuppliersTab];
  return e("div",{className:"app"},
    e("div",{className:"header"},e("h1",null,"Shafston Accounts Payable Dashboard"),e("div",{className:"subtitle"},"Shafston International Pty Ltd | Jul 2025 - Mar 2026 | Excluding Long-Term Debt")),
    e("div",{className:"tabs"},tabs.map(function(t,i){return e("div",{key:i,className:"tab"+(tab===i?" active":""),onClick:function(){setTab(i)}},t)})),
    e(panels[tab])
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(e(App));
</script>
