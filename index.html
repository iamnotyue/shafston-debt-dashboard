<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0B1120;color:#E2E8F0;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
.app{max-width:1400px;margin:0 auto;padding:20px}
.header{text-align:center;padding:24px 0 16px}
.header h1{font-size:24px;font-weight:700;color:#F8FAFC;letter-spacing:-0.5px}
.header .sub{font-size:13px;color:#64748B;margin-top:4px}
.tabs{display:flex;gap:4px;justify-content:center;margin:16px 0 20px;flex-wrap:wrap}
.tab{padding:8px 20px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;background:#1E293B;color:#94A3B8;border:1px solid transparent;transition:all .2s}
.tab:hover{background:#334155;color:#CBD5E1}
.tab.active{background:#3B82F6;color:#FFF;border-color:#3B82F6}
.grid{display:grid;gap:16px}
.g4{grid-template-columns:repeat(4,1fr)}.g3{grid-template-columns:repeat(3,1fr)}.g2{grid-template-columns:repeat(2,1fr)}
.card{background:#1E293B;border-radius:12px;padding:20px;border:1px solid #334155}
.ct{font-size:12px;color:#64748B;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.cv{font-size:28px;font-weight:700;color:#F8FAFC}
.cv.green{color:#34D399}.cv.red{color:#F87171}.cv.blue{color:#60A5FA}.cv.amber{color:#FBBF24}.cv.purple{color:#A78BFA}
.cs{font-size:12px;color:#64748B;margin-top:4px}
.st{font-size:16px;font-weight:600;color:#F1F5F9;margin:24px 0 12px;display:flex;align-items:center;gap:8px}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.b-red{background:rgba(248,113,113,.15);color:#F87171}
.b-green{background:rgba(52,211,153,.15);color:#34D399}
.b-amber{background:rgba(251,191,36,.15);color:#FBBF24}
.b-blue{background:rgba(59,130,246,.15);color:#60A5FA}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 12px;color:#94A3B8;font-weight:500;border-bottom:1px solid #334155;font-size:12px;text-transform:uppercase;letter-spacing:.3px}
td{padding:10px 12px;border-bottom:1px solid rgba(51,65,85,.5);color:#CBD5E1}
tr:hover td{background:rgba(51,65,85,.3)}
.tr{text-align:right}
.pbar{height:8px;border-radius:4px;background:#334155;overflow:hidden;min-width:80px}
.pfill{height:100%;border-radius:4px;transition:width .3s}
.note{font-size:12px;color:#64748B;padding:12px 16px;background:rgba(30,41,59,.5);border-radius:8px;border-left:3px solid #3B82F6;margin-top:12px}
.warn{border-left-color:#F59E0B}
@media(max-width:900px){.g4,.g3{grid-template-columns:repeat(2,1fr)}.g2{grid-template-columns:1fr}}
@media(max-width:600px){.g4,.g3,.g2{grid-template-columns:1fr}.app{padding:12px}}
</style>

function OverallClearanceChart(){

  var keys=["jan","feb","mar","apr"];
  var data=[{name:"Dec 25",Remaining:totalStart}];
  var cumTrade=0,cumStat=0;
  months.forEach(function(mo,i){
    cumTrade+=(CLEARANCE[i]?CLEARANCE[i].cleared:0);
    var statMo=0;
    STAT_CLEARANCE.forEach(function(c){statMo+=(c[keys[i]]||0)});
    cumStat+=statMo;
    data.push({name:mo+" 26"+(i===3?"*":""),Remaining:totalStart-cumTrade-cumStat});
  });

function UnpaidListSection(){
  var filterState=useState("All");

    if(filter!=="All"&&inv.mo!==filter)return false;

    return true;
  });
  var totalDue=filtered.reduce(function(s,inv){return s+inv.due},0);

    e("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12,marginBottom:12}},
      e("div",{style:{display:"flex",gap:4,flexWrap:"wrap"}},
        months.map(function(mo){
          var cnt=mo==="All"?PAY_UNPAID.length:PAY_UNPAID.filter(function(inv){return inv.mo===mo}).length;
          return e("div",{key:mo,onClick:function(){setFilter(mo)},

      e("div",{style:{display:"flex",gap:4,flexWrap:"wrap"}},
        cats.map(function(c){
          return e("div",{key:c,onClick:function(){setCatFilter(c)},

              border:"1px solid "+(catFilter===c?"#475569":"#334155"),transition:"all .2s"}
          },c)

      )
    ),
    e("div",{style:{display:"flex",gap:12,marginBottom:12,fontSize:13}},
      e("span",{style:{color:"#94A3B8"}},filtered.length+" invoices"),
      e("span",{style:{color:"#F87171",fontWeight:600}},"Total: "+fmt(totalDue))
    ),
    e("div",{className:"card",style:{padding:0,overflow:"auto",maxHeight:500}},
      e("table",null,
        e("thead",null,e("tr",null,

          e("th",{style:{position:"sticky",top:0,background:"#1E293B",zIndex:1}},"Contact"),
          e("th",{style:{position:"sticky",top:0,background:"#1E293B",zIndex:1}},"Invoice"),
          e("th",{style:{position:"sticky",top:0,background:"#1E293B",zIndex:1}},"Category"),
          e("th",{className:"tr",style:{position:"sticky",top:0,background:"#1E293B",zIndex:1}},"Inv Date"),
          e("th",{className:"tr",style:{position:"sticky",top:0,background:"#1E293B",zIndex:1}},"Due Date"),
          e("th",{className:"tr",style:{position:"sticky",top:0,background:"#1E293B",zIndex:1}},"Total"),
          e("th",{className:"tr",style:{position:"sticky",top:0,background:"#1E293B",zIndex:1}},"Due")
        )),
        e("tbody",null,
          filtered.map(function(inv,i){
            var catColor=catColors[inv.cat]||"#64748B";
            return e("tr",{key:i},
              e("td",{style:{color:"#475569",fontSize:11}},i+1),

              e("td",{className:"tr",style:{fontSize:12,color:"#94A3B8"}},inv.date.substring(5)),
              e("td",{className:"tr",style:{fontSize:12,color:"#94A3B8"}},inv.dueDate.substring(5)),
              e("td",{className:"tr",style:{fontSize:12}},fmt(inv.total)),
              e("td",{className:"tr",style:{fontSize:13,fontWeight:700,color:"#F87171"}},fmt(inv.due))
